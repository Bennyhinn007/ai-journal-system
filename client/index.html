<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Journal - Nature Session Insights</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    #root {
      max-width: 1200px;
      margin: 0 auto;
    }

    .container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
    }

    h1 {
      color: #667eea;
      margin-bottom: 30px;
      text-align: center;
    }

    h2 {
      color: #764ba2;
      margin-top: 30px;
      margin-bottom: 15px;
      font-size: 1.3em;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    input[type='text'],
    input[type='email'],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1em;
      font-family: inherit;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      background: #667eea;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 600;
      transition: background 0.3s;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    button:hover {
      background: #764ba2;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .entry {
      background: #f9f9f9;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 4px;
    }

    .entry-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .entry-ambience {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.85em;
      margin-bottom: 5px;
    }

    .entry-date {
      color: #999;
      font-size: 0.9em;
    }

    .entry-text {
      color: #333;
      line-height: 1.6;
      margin: 10px 0;
    }

    .analysis-result {
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
      padding: 15px;
      margin: 15px 0;
      border-radius: 4px;
    }

    .emotion-badge {
      display: inline-block;
      background: #4caf50;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .keywords {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .keyword {
      background: #c8e6c9;
      color: #2e7d32;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.9em;
    }

    .insights {
      background: #e3f2fd;
      border-left: 4px solid #2196f3;
      padding: 20px;
      margin: 20px 0;
      border-radius: 4px;
    }

    .insight-stat {
      margin: 10px 0;
      font-size: 1.05em;
    }

    .loading {
      color: #667eea;
      font-style: italic;
    }

    .error {
      background: #ffebee;
      border-left: 4px solid #f44336;
      color: #c62828;
      padding: 15px;
      margin: 15px 0;
      border-radius: 4px;
    }

    .success {
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
      color: #2e7d32;
      padding: 15px;
      margin: 15px 0;
      border-radius: 4px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #ddd;
    }

    .tab-button {
      padding: 12px 20px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-weight: 600;
      color: #999;
      transition: all 0.3s;
    }

    .tab-button.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
